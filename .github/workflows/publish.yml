name: Publish

on:
  workflow_run:
    workflows: ["Check"]
    types: [completed]
    branches: [main]

jobs:
  aggregate-changelog:
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - run: node scripts/aggregate-changelog.ts

      - name: Commit aggregated changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore: regenerate aggregated changelog [skip ci]"
          git push

  publish:
    needs: aggregate-changelog
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          # Pin to the exact commit Check just validated, not whatever main's
          # tip happens to be by the time this job starts - protects against
          # publishing a different, unvalidated commit if another push
          # landed on main in the meantime. The aggregate-changelog job above
          # may have since pushed its own commit on top of this one, but that
          # commit only touches the root CHANGELOG.md, which doesn't affect
          # what gets published.
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          scope: "@time-provider"
          cache: false
          run-install: false

      - run: vp install --frozen-lockfile

      # TODO: restore when issue 2189 ( https://github.com/voidzero-dev/vite-plus/issues/2189 ) is solved
      # - name: Publishing
      #   env:
      #     ACTIONS_ID_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
      #     ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
      #   run: vp run release

      # Because of issue 2189 ( https://github.com/voidzero-dev/vite-plus/issues/2189 ), we explicitely run packages release from here, instead of calling "vp run release"
      - name: Publishing
        run: |
          npm run -w @time-provider/core release
          npm run -w @time-provider/plugin-dayjs release
          npm run -w @time-provider/plugin-luxon release
          npm run -w @time-provider/plugin-moment release
          npm run -w @time-provider/plugin-native release
          npm run -w @time-provider/plugin-temporal release

name: Label issues awaiting release

on:
  pull_request:
    types: [closed]

# Shares its group with "Close released issues" so the two can never run at the same time.
# queue: max ensures every merge to main gets processed (each is responsible for a distinct issue), none silently dropped if several land close together.
# This workflow needs "Auto-close issues with merged linked pull requests" is unchecked on github.
concurrency:
  group: issue-lifecycle
  cancel-in-progress: false
  queue: max

permissions:
  issues: write
  pull-requests: read

jobs:
  label-awaiting-release:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      !startsWith(github.event.pull_request.head.ref, 'release-please--branches--')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const label = "awaiting-release";

            // Create the label if it doesn't exist yet - ignore the error if it already does.
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: "fbca04",
                description: "Fix merged, not yet released",
              });
            } catch (error) {
              if (error.status !== 422) throw error;
            }

            const query = `
              query($owner: String!, $repo: String!, $number: Int!, $cursor: String) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    closingIssuesReferences(first: 50, after: $cursor) {
                      nodes {
                        number
                        repository {
                          owner { login }
                          name
                        }
                      }
                      pageInfo { hasNextPage endCursor }
                    }
                  }
                }
              }
            `;

            const issueNumbers = [];
            let cursor = null;
            let hasNextPage = true;

            while (hasNextPage) {
              const result = await github.graphql(query, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                number: prNumber,
                cursor,
              });
              const { nodes, pageInfo } = result.repository.pullRequest.closingIssuesReferences;
              for (const node of nodes) {
                if (
                  node.repository.owner.login === context.repo.owner &&
                  node.repository.name === context.repo.repo
                ) {
                  issueNumbers.push(node.number);
                }
              }
              hasNextPage = pageInfo.hasNextPage;
              cursor = pageInfo.endCursor;
            }

            for (const issueNumber of issueNumbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                });

                if (issue.state !== "open") continue;

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: `Fixed by #${prNumber}. This issue will be closed once released.`,
                });
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  labels: [label],
                });
              } catch (error) {
                // Don't let one problematic issue block labelling the rest.
                core.warning(`Failed to label issue #${issueNumber}: ${error.message}`);
              }
            }

name: Aggregate changelog

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: node scripts/aggregate-changelog.ts

      - name: Commit aggregated changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore: regenerate aggregated changelog [skip ci]"
          git push

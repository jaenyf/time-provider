name: Sync dev with main

on:
  workflow_run:
    workflows: ["Publish"]
    types: [completed]
    branches: [main]

# Never cancel an in-progress run: interrupting mid-rebase-and-push could leave dev in a half-rebased state.
# Queue instead.
concurrency:
  group: sync-dev-with-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  rebase-dev:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          ref: dev
          fetch-depth: 0

      - name: Rebase dev onto main
        id: rebase
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main

          # Rebase onto main's actual current tip, not the Check-validated SHA
          # this workflow chain started from - Publish's aggregate-changelog
          # job has, by now, pushed its own commit on top of that SHA, and
          # dev should pick that up too.
          if git rebase origin/main; then
            echo "conflict=false" >> "$GITHUB_OUTPUT"
          else
            # Leave dev untouched on the remote - abort the local rebase
            # rather than pushing a half-resolved history.
            git rebase --abort
            echo "conflict=true" >> "$GITHUB_OUTPUT"
          fi

      # Safe (and a no-op) even when the rebase above was a pure fast-forward
      # with nothing to replay - --force-with-lease only overwrites the
      # remote if it still matches what we just fetched.
      - name: Push rebased dev
        id: push
        if: steps.rebase.outputs.conflict == 'false'
        run: |
          if git push --force-with-lease origin dev; then
            echo "rejected=false" >> "$GITHUB_OUTPUT"
          else
            echo "rejected=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Warn on conflict
        if: steps.rebase.outputs.conflict == 'true'
        run: |
          echo "::warning title=dev/main sync conflict::Rebasing dev onto main hit a conflict (likely a direct hotfix on main touching the same lines as unreleased work on dev). dev was left untouched on the remote - resolve this manually with 'git rebase origin/main' locally."

      # dev moved on the remote between our fetch and this push.
      # Surface it as a warning rather than a failed job; the next push to main will simply retry the whole sync.
      - name: Warn on concurrent push to dev
        if: steps.rebase.outputs.conflict == 'false' && steps.push.outputs.rejected == 'true'
        run: |
          echo "::warning title=dev/main sync conflict::Pushing the rebased dev was rejected (--force-with-lease) - dev was updated by someone else between this job's fetch and push. dev was left untouched on the remote - resolve this manually with 'git rebase origin/main' locally."

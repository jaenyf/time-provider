name: CI

on:
  pull_request:
  push:
    branches: [dev, main, ci]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install --frozen-lockfile
      - run: vp build
      - run: vp check
      - run: bun test

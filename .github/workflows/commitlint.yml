name: Commitlint

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
  push:
    branches: "**"

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"

      - name: Lint commits (pull request range)
        if: github.event_name == 'pull_request'
        run: vpx -p @commitlint/cli -p @commitlint/config-conventional commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

      # A squash-merge uses the PR title as the final commit message on dev -
      # release-please reads that message to classify the change. Lint it too, with the same rules, so a non-conventional title can't slip
      # through and silently drop out of the changelog.
      - name: Lint PR title (squash-merge commit message)
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: echo "$PR_TITLE" | vpx -p @commitlint/cli -p @commitlint/config-conventional commitlint --verbose

      # Direct pushes bypass PR review entirely. This step re-validates, server-side, whichever commits actually landed by this push
      - name: Lint commits (pushed range)
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: vpx -p @commitlint/cli -p @commitlint/config-conventional commitlint --from ${{ github.event.before }} --to ${{ github.sha }} --verbose

      # A brand new branch has no prior ref to diff against. Lint its single tip commit directly instead of skipping validation entirely.
      - name: Lint commit (new branch, first push)
        if: github.event_name == 'push' && github.event.before == '0000000000000000000000000000000000000000'
        run: git log -1 --format=%B ${{ github.sha }} | vpx -p @commitlint/cli -p @commitlint/config-conventional commitlint --verbose

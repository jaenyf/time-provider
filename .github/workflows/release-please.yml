name: Release Please

on:
  push:
    branches:
      - dev

# Never cancel an in-progress run: interrupting release-please mid-update could leave the release PR (or the manifest) in an inconsistent state.
# Queue instead.
concurrency:
  group: release-please
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: googleapis/release-please-action@v5
        with:
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          include-component-in-tag: true
          token: ${{ secrets.GITHUB_TOKEN }}

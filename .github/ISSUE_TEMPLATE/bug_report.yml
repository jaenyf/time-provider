name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Affected package(s)
      multiple: true
      options:
        - "@time-provider/core"
        - "@time-provider/plugin-native"
        - "@time-provider/plugin-dayjs"
        - "@time-provider/plugin-luxon"
        - "@time-provider/plugin-moment"
        - "@time-provider/plugin-moment-timezone"
        - "@time-provider/plugin-temporal"
        - Not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version(s)
      placeholder: e.g. @time-provider/core@1.1.0
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: A short code snippet that reproduces the issue.
      render: typescript
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime
      placeholder: e.g. Node 22.12, Bun 1.3.14, or browser + version
    validations:
      required: true
